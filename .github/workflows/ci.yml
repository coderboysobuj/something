name: CI
on: [push, pull_request]

jobs:
  build-linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies
        run:
          sudo apt-get update
          sudo apt-get install -qq libsdl2-dev libpng-dev
      - name: build the game
        run:
          make
        env: 
          CC: gcc
  build-linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies
        run:
          sudo apt-get update
          sudo apt-get install -qq libsdl2-dev libpng-dev
      - name: build the game
        run:
          make
        env: 
          CC: clang
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
      - name: install dependencies
        run:
          brew install sdl2 libpng pkg-config
      - name: build the game
        run:
          make
        env: 
          CC: clang
  # TODO: add windows build
